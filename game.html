<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play — Pacedall Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .game-page { min-height: 100vh; background: var(--navy-dark); padding-top: 73px; display: flex; flex-direction: column; }
    .game-topbar { background: var(--navy); border-bottom: 3px solid var(--gold); padding: 14px 24px; display: flex; align-items: center; gap: 20px; }
    .game-topbar-back { font-family: var(--font-display); font-size: 0.42rem; color: var(--gold); border: 2px solid var(--gold); padding: 8px 14px; transition: all 0.15s; min-height: 44px; display: flex; align-items: center; }
    .game-topbar-back:hover { background: var(--gold); color: var(--navy-dark); }
    .game-topbar-title { font-family: var(--font-display); font-size: 0.55rem; color: var(--white); letter-spacing: 0.08em; }
    .game-topbar-badges { display: flex; gap: 8px; margin-left: auto; }
    .game-viewport { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 40px 24px; gap: 24px; }
    .game-canvas-wrap { background: #000; border: 4px solid var(--gold); box-shadow: 0 0 40px rgba(245,166,35,0.3), 8px 8px 0 rgba(0,0,0,0.5); position: relative; max-width: 800px; width: 100%; }
    .game-canvas-wrap canvas { width: 100%; height: auto; display: block; }
    .game-crt { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px); pointer-events: none; }
    .game-controls-hint { font-family: var(--font-display); font-size: 0.38rem; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-align: center; }
    .game-footer-bar { background: var(--navy); border-top: 3px solid rgba(255,255,255,0.1); padding: 16px 24px; display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
    .game-footer-bar a { font-family: var(--font-display); font-size: 0.38rem; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; padding: 8px 14px; border: 2px solid rgba(255,255,255,0.2); min-height: 44px; display: flex; align-items: center; transition: all 0.15s; }
    .game-footer-bar a:hover { color: var(--gold); border-color: var(--gold); }
    .placeholder-screen { width: 100%; aspect-ratio: 4/3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #050A1E; font-family: var(--font-display); color: var(--pixel-green); }
    .placeholder-title { font-size: 0.8rem; letter-spacing: 0.1em; animation: pixelBlink 1s step-end infinite; }
    .placeholder-sub { font-size: 0.4rem; color: rgba(57,255,20,0.5); }
    .placeholder-icon { font-size: 4rem; }
  </style>
</head>
<body>
  <header class="header" id="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <img src="images/logo.png" alt="Pacedall Arcade" />
        <span class="header-logo-text">ARCADE</span>
      </a>
      <div class="header-actions" style="margin-left:auto;">
        <a href="#" class="btn btn-crt btn-sm" style="font-size:0.38rem;">↓ GET APP</a>
      </div>
    </div>
    <div class="header-accent-bar"></div>
  </header>

  <main class="game-page">
    <div class="game-topbar">
      <a href="index.html" class="game-topbar-back">← BACK</a>
      <span class="game-topbar-title" id="game-title">LOADING...</span>
      <div class="game-topbar-badges">
        <span class="game-badge badge-free">FREE</span>
        <span class="game-badge badge-offline">OFFLINE</span>
      </div>
    </div>

    <div class="game-viewport">
      <div class="game-canvas-wrap">
        <div class="placeholder-screen">
          <div class="placeholder-icon" id="game-icon">🎮</div>
          <div class="placeholder-title">GAME LOADING...</div>
          <div class="placeholder-sub">PRESS ANY KEY TO START</div>
        </div>
        <div class="game-crt"></div>
      </div>
      <p class="game-controls-hint" id="controls-hint">ARROW KEYS TO MOVE · SPACE TO FIRE · ESC TO PAUSE</p>
    </div>

    <div class="game-footer-bar">
      <a href="index.html#games">← ALL GAMES</a>
      <a href="index.html#platforms">GET iOS APP</a>
      <a href="index.html#platforms">GET ANDROID APP</a>
      <a href="https://terms.pacedall.com" target="_blank" rel="noopener">TERMS</a>
      <a href="https://privacy.pacedall.com" target="_blank" rel="noopener">PRIVACY</a>
    </div>
  </main>

  <script>
    // Read game ID from URL
    const params = new URLSearchParams(window.location.search);
    const gameId = params.get('id') || 'unknown';
    const GAMES = {
      'invaders': { name: 'SPACE INVADERS', icon: '👾', controls: 'ARROW KEYS TO MOVE · SPACE TO FIRE' },
      'snake':    { name: 'SNAKE CLASSIC',  icon: '🐍', controls: 'ARROW KEYS TO MOVE' },
      'breakout': { name: 'BRICK BREAKER',  icon: '🧱', controls: 'LEFT/RIGHT ARROWS TO MOVE PADDLE' },
      'asteroids':{ name: 'ASTEROID BELT',  icon: '☄️', controls: 'ARROWS TO ROTATE/THRUST · SPACE TO FIRE' },
      'frogger':  { name: 'ROAD HOPPER',    icon: '🐸', controls: 'ARROW KEYS TO MOVE' },
      'tetris':   { name: 'BLOCK FALL',     icon: '🟦', controls: 'ARROWS TO MOVE · UP TO ROTATE' },
      'pacman':   { name: 'DOT PATROL',     icon: '🟡', controls: 'ARROW KEYS TO MOVE' },
      'galaga':   { name: 'GALAGA ECHO',    icon: '🚀', controls: 'ARROW KEYS TO MOVE · SPACE TO FIRE' },
      'defender': { name: 'SIDE DEFENDER',  icon: '✈️', controls: 'ARROW KEYS TO MOVE · SPACE TO FIRE' },
      'pong':     { name: 'PONG DUEL',      icon: '🏓', controls: 'W/S TO MOVE PADDLE' },
      'donkey':   { name: 'BARREL RUN',     icon: '🦍', controls: 'ARROW KEYS TO MOVE · SPACE TO JUMP' },
      'centipede':{ name: 'CENTIPEDE',      icon: '🐛', controls: 'ARROWS TO MOVE · SPACE TO FIRE' }
    };
    const game = GAMES[gameId];
    if (game) {
      document.getElementById('game-title').textContent = game.name;
      document.getElementById('game-icon').textContent = game.icon;
      document.getElementById('controls-hint').textContent = game.controls;
      document.title = game.name + ' — Pacedall Arcade';
    }
    // Header scroll
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
