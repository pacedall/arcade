<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Pacedall Arcade</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;600;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><img src="images/logo.png" alt="Pacedall Arcade" /></a>
      <div class="nav-actions">
        <a href="signup.html" class="btn btn-primary">Sign Up Free</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <img src="images/logo.png" alt="Pacedall Arcade" class="auth-logo" />
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Log in to continue your arcade journey</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary form-submit" onclick="handleLogin()">Log In →</button>

      <div class="auth-divider">or</div>
      <button class="btn btn-outline form-submit" style="background:#fff">Continue with Google</button>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up free</a></p>
    </div>
  </main>

  <script>
    function handleLogin() {
      alert('Login functionality coming soon!');
    }
  </script>
</body>
</html>
