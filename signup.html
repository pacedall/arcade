<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Pacedall Arcade</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;600;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><img src="images/logo.png" alt="Pacedall Arcade" /></a>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Log In</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <img src="images/logo.png" alt="Pacedall Arcade" class="auth-logo" />
      <h1 class="auth-title">Join the Arcade</h1>
      <p class="auth-sub">Free to sign up. Play 30+ games instantly.</p>

      <div class="form-group">
        <label class="form-label" for="name">Display Name</label>
        <input class="form-input" type="text" id="name" placeholder="ArcadeHero" />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Create a password" />
      </div>
      <button class="btn btn-primary form-submit" onclick="handleSignup()">Create Free Account →</button>

      <div class="auth-divider">or</div>
      <button class="btn btn-outline form-submit">Continue with Google</button>

      <p class="auth-switch" style="margin-top:16px; font-size:0.78rem; color: var(--gray-400);">
        By signing up, you agree to our <a href="#" style="color:var(--orange)">Terms</a> and <a href="#" style="color:var(--orange)">Privacy Policy</a>.
      </p>
      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>

  <script>
    function handleSignup() {
      alert('Signup functionality coming soon!');
    }
  </script>
</body>
</html>
